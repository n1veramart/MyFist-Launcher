name: Build MyFist APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # Step 1: Tell the robot where 'gradlew' is hiding
      - name: Grant execute permission for gradlew
        run: chmod +x android-launcher/gradlew

      # Step 2: Jump into the folder before starting the build
      - name: Build with Gradle
        run: |
          cd android-launcher
          ./gradlew assembleDebug

      # Step 3: Tell the robot where to find the finished APK to give back to you
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyFist-Launcher-APK
          path: android-launcher/app/build/outputs/apk/debug/app-debug.apk
